name: CD - Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check secrets
        id: check
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        if: steps.check.outputs.has_secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=xtoolbox --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment PR with preview URL
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = '## Preview Deployed\n\nPreview URL: ' + url + '\n\nLighthouse and E2E checks will run automatically.';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number, body,
            });

      - name: Skip deploy (secrets not configured)
        if: steps.check.outputs.has_secrets != 'true'
        run: echo "::warning::CLOUDFLARE_API_TOKEN not set. Deploy skipped."

  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check secrets
        id: check
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Pages (production)
        id: deploy
        if: steps.check.outputs.has_secrets == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=xtoolbox --branch=main

      - name: Verify deployment
        if: steps.deploy.outcome == 'success'
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://xtoolbox.pages.dev)
            if [ "$STATUS" = "200" ]; then
              echo "Site is live (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting for deployment... (attempt $i, status: $STATUS)"
            sleep 10
          done
          echo "Site not reachable after 100s"
          exit 1

      - name: Deploy failed
        if: failure()
        run: |
          echo "::error::Production deploy failed. Check wrangler output above."
          exit 1

      - name: Skip deploy (secrets not configured)
        if: steps.check.outputs.has_secrets != 'true'
        run: echo "::warning::CLOUDFLARE_API_TOKEN not set. Deploy skipped."
