name: Release Notes

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous release tag
        id: prev
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Collect changes
        run: |
          PREV="${{ steps.prev.outputs.tag }}"
          CURRENT="${{ github.event.release.tag_name }}"
          echo "## Changes from $PREV to $CURRENT" > changes.md
          echo "" >> changes.md
          git log "$PREV..$CURRENT" --pretty=format:"- %s (%h)" --no-merges >> changes.md
          echo "" >> changes.md
          echo "### Files changed" >> changes.md
          git diff --stat "$PREV..$CURRENT" >> changes.md

      - name: Generate AI release notes
        if: ${{ secrets.ZAI_API_KEY != '' }}
        uses: actions/github-script@v7
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const changes = fs.readFileSync('changes.md', 'utf8');
            const prompt = 'You are a technical release notes writer for xtoolbox, a collection of 314+ free online developer/creator tools (100% client-side). Given the following git changes between two releases, generate clear, concise, user-facing release notes. Group changes into categories: New Features, Improvements, Bug Fixes, Developer Experience, Performance. Skip internal-only changes. Use simple language. Be specific.\n\nChanges:\n' + changes;
            const response = await fetch('https://api.z.ai/api/paas/v4/chat/completions', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + process.env.ZAI_API_KEY },
              body: JSON.stringify({ model: 'glm-4.7-flash', messages: [{ role: 'user', content: prompt }], max_tokens: 2000, temperature: 0.3 }),
            });
            if (!response.ok) { core.warning('Z.AI API error: ' + response.status); return; }
            const data = await response.json();
            const notes = data.choices[0].message.content;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner, repo: context.repo.repo,
              release_id: context.payload.release.id, body: notes,
            });
            core.info('Release notes generated and published');

      - name: Fallback - raw changelog
        if: ${{ secrets.ZAI_API_KEY == '' }}
        run: cat changes.md
